name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "electron/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "electron/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          unset VIRTUAL_ENV
          uv sync --group dev

      - name: Run tests
        working-directory: backend
        run: |
          unset VIRTUAL_ENV
          uv run pytest -x --tb=short -q --ignore=tests/test_browser_ops.py
