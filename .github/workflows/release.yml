name: Release

on:
  push:
    tags:
      - "[0-9]*"
  workflow_dispatch:

jobs:
  release-pypi:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: electron/package-lock.json

      - name: Build frontend
        working-directory: electron
        run: |
          npm ci
          npm run build:web

      - name: Sync README for PyPI
        working-directory: backend
        run: cp ../README.md README.md

      - name: Build package
        working-directory: backend
        run: uv build

      - name: Check if dev tag
        id: check-dev
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -match 'dev') {
            echo "is_dev=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "is_dev=false" >> $env:GITHUB_OUTPUT
          }
        shell: pwsh

      - name: Publish to TestPyPI
        if: steps.check-dev.outputs.is_dev == 'true'
        working-directory: backend
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.TEST_PYPI_TOKEN }}
        run: uv publish --publish-url https://test.pypi.org/legacy/

      - name: Publish to PyPI
        if: steps.check-dev.outputs.is_dev != 'true'
        working-directory: backend
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: uv publish

  release-electron:
    if: ${{ !contains(github.ref_name, 'dev') }}
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: electron/package-lock.json

      - name: Build Electron app
        working-directory: electron
        run: |
          npm ci
          npm run electron:build

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: electron/release/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
